name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build and minify assets
        run: npm run build

      - name: Copy built files to root for deployment
        run: |
          cp dist/js/program-data.js js/program-data.js
          cp dist/js/lesson-enhancements.js js/lesson-enhancements.js
          cp dist/js/quiz-generators.js js/quiz-generators.js
          cp dist/js/common.js js/common.js
          cp dist/js/home.js js/home.js
          cp dist/js/curriculum.js js/curriculum.js
          cp dist/js/lesson.js js/lesson.js
          cp dist/js/quiz.js js/quiz.js
          cp dist/js/roadmap.js js/roadmap.js
          cp dist/js/dashboard.js js/dashboard.js
          cp dist/js/diagnostic.js js/diagnostic.js
          cp dist/styles.css styles.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
